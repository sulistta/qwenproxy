services:
  qwenproxy:
    build: .
    container_name: qwenproxy
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
      - ./qwen_profiles:/app/qwen_profiles
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
